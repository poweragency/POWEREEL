pipeline:
  dry_run: true
  schedule_cron: 0 8 * * *
  output_dir: ./output
  max_days_kept: 7
scraper:
  feeds:
  - name: CoinDesk
    url: https://www.coindesk.com/arc/outboundfeeds/rss/
    lang: en
  - name: CoinTelegraph
    url: https://cointelegraph.com/rss
    lang: en
  - name: Il Sole 24 Ore Finanza
    url: https://www.ilsole24ore.com/rss/finanza.xml
    lang: it
  max_articles_per_feed: 5
  max_total_articles: 10
scriptwriter:
  model: claude-sonnet-4-6
  max_tokens: 1024
  target_duration_seconds: 45
  language: it
  tone: coinvolgente, diretto, informativo, leggermente informale
  system_prompt: 'Sei un creator italiano di reel finanziari su Instagram.

    Scrivi uno script parlato per un video di circa {duration} secondi.

    Tono: {tone}.


    Lo script deve avere:

    - Un hook iniziale forte (prima frase accattivante per fermare lo scroll)

    - 2-3 notizie chiave riassunte in modo chiaro e semplice

    - Una chiusura con call-to-action (seguimi, commenta, condividi)


    Regole CRITICHE sulla lingua:

    - Scrivi ESCLUSIVAMENTE in italiano corretto e fluente.

    - VIETATO usare parole inglesi o anglicismi nel parlato. Sostituisci sempre
      con l''equivalente italiano. Esempi: "at" → "a"; "now" → "ora"; "and" →
      "e"; "the" → "il/la"; "today" → "oggi"; "growth" → "crescita".

    - I nomi propri (Trump, Tesla, Bitcoin, Ethereum) restano invariati, MA
      tutti i sostantivi/verbi/avverbi vanno tradotti.

    - Usa la grafia italiana standard: niente apostrofi inglesi, niente
      contrazioni tipo "n''", scrivi i numeri in cifre normali.

    - Niente formule miste tipo "BTC at 50K" — usa "Bitcoin a 50 mila" o
      "Bitcoin a 50.000 dollari".


    Altre regole:

    - Scrivi SOLO lo script parlato, senza indicazioni di regia o note.

    - Usa un linguaggio naturale e colloquiale, come se parlassi a un amico.

    - Non usare emoji nel testo.

    - Circa {word_count} parole totali (massimo +10%).

    '
heygen:
  avatar_id: 32dbae75ebcb4edfbd5028d1b9f48d23
  voice_id: 2fa3feadb7884b849657f78df86a5057
  video_width: 1080
  video_height: 1920
  background_type: color
  background_value: '#000000'
  poll_interval_seconds: 15
  poll_max_attempts: 40
  subtitle_source: custom
  caption: false
editor:
  subtitle:
    font_path: ./assets/fonts/BebasNeue-Regular.ttf
    font_size: 72
    font_color: '#FFFFFF'
    accent_color: '#E8163C'
    stroke_color: '#000000'
    stroke_width: 5
    words_per_subtitle: 3
    uppercase: true
    add_emoji: true
    highlight_style: box
    preset: with_emoji
    position: center
    max_chars_per_line: 25
  background_music:
    path: ./assets/music/default_bg.mp3
    volume: 0.08
  intro_clip: null
  outro_clip: null
  lower_third:
    image: null
    duration_seconds: 5
    position:
    - 540
    - 1600
publisher:
  caption_template: '📊 Le news crypto e finanza di oggi!

    .

    {summary_bullets}

    .

    #crypto #finanza #bitcoin #investimenti #reels #trading #criptovalute

    '
  max_hashtags: 30
generation_mode: manual
