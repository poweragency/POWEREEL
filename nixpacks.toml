# Nixpacks config — installs Python, pip, ffmpeg

[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "ffmpeg-headless", "gcc"]

[phases.install]
cmds = ["python -m pip install --upgrade pip", "python -m pip install -r requirements.txt"]

[start]
cmd = "streamlit run app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true --server.enableCORS=false --server.enableXsrfProtection=false"
